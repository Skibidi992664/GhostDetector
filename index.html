<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ghost Detector — PWA</title>
  <link rel="stylesheet" href="style.css">
  <meta name="theme-color" content="#070b1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Ghost Detector">
</head>
<body>
  <header>
    <h1>Ghost Detector</h1>
    <p class="subtitle">Live anomaly scanner — Safari PWA on iPhone</p>
  </header>

  <main>
    <div id="hud">
      <div>
        <div class="label">Anomaly Score</div>
        <div id="score" class="score">0</div>
      </div>
      <div>
        <div class="label">Active Sensors</div>
        <div id="sensors" class="small">none</div>
      </div>
    </div>

    <div class="status-panel">
      <span id="status">Ready — tap START to request camera, microphone and motion.</span>
    </div>

    <div class="control-row">
      <button id="startBtn">START</button>
      <button id="exportBtn">EXPORT</button>
      <button id="clearBtn">CLEAR</button>
    </div>

    <div class="storage-row">
      <input id="passphrase" type="password" placeholder="Passphrase for saved events" />
      <button id="lockBtn">Lock / Unlock</button>
      <div class="storage-note">Saved locally; encrypted when locked.</div>
    </div>

    <section>
      <h2>Live Spectrogram</h2>
      <canvas id="spec" width="600" height="120"></canvas>
    </section>

    <section>
      <h2>Camera Preview</h2>
      <video id="video" autoplay playsinline muted></video>
      <canvas id="vcanvas" width="320" height="240" hidden></canvas>
    </section>

    <section>
      <h2>Timeline</h2>
      <ul id="events"></ul>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
